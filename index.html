<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobHunter AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

header{
padding:25px;
background:#111827;
border-bottom:1px solid #1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
color:#94a3b8;
}

.search-section{
margin-top:30px;
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.stats{
margin-top:25px;
padding:15px;
background:#1e293b;
border-radius:10px;
}

.jobs{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.job{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.job h3{
margin-bottom:10px;
}

.job p{
margin-bottom:8px;
color:#cbd5e1;
}

.job a{
display:inline-block;
margin-top:12px;
padding:10px 15px;
background:#16a34a;
color:white;
border-radius:8px;
text-decoration:none;
}

.job a:hover{
background:#15803d;
}

.loading{
text-align:center;
padding:50px;
font-size:18px;
}

@media(max-width:768px){
h1{
font-size:30px;
}
}
</style>
</head>
<body>

<header>
<div class="container">
<h1>JobHunter AI</h1>
<div class="subtitle">
‎חיפוש משרות אמיתיות בזמן אמת
</div>
</div>
</header>

<div class="container">

<div class="search-section">

<input
type="text"
id="searchInput"
placeholder="QA Automation, SDET, Java, Backend..."
>

<button onclick="searchJobs()">
‎חפש משרות
</button>

<input
type="file"
accept=".pdf,.doc,.docx"
>

</div>

<div class="stats">
<span id="jobCount">0</span> משרות נמצאו
</div>

<div id="jobs" class="jobs"></div>

</div>

<script>

let allJobs = [];

async function loadJobs(){

const jobsContainer =
document.getElementById("jobs");

jobsContainer.innerHTML =
'<div class="loading">טוען משרות...</div>';

try{

const response =
await fetch("https://www.arbeitnow.com/api/job-board-api");

const data =
await response.json();

allJobs =
data.data || [];

renderJobs(allJobs);

}
catch(error){

jobsContainer.innerHTML = `
<div class="job">
<h3>לא ניתן לטעון משרות כרגע</h3>
<p>נסה שוב מאוחר יותר</p>
</div>
`;

console.error(error);

}

}

function renderJobs(jobs){

document.getElementById("jobCount")
.innerText = jobs.length;

const jobsContainer =
document.getElementById("jobs");

if(jobs.length === 0){

jobsContainer.innerHTML = `
<div class="job">
<h3>לא נמצאו תוצאות</h3>
</div>
`;

return;
}

jobsContainer.innerHTML = "";

jobs.slice(0,100).forEach(job=>{

jobsContainer.innerHTML += `

<div class="job">

<h3>${job.title || ""}</h3>

<p>
<strong>חברה:</strong>
${job.company_name || ""}
</p>

<p>
<strong>מיקום:</strong>
${job.location || "Remote"}
</p>

<p>
<strong>Remote:</strong>
${job.remote ? "כן" : "לא"}
</p>

${job.url}
‎הגש מועמדות
</a>

</div>

`;

});

}

function searchJobs(){

const text =
document
.getElementById("searchInput")
.value
.toLowerCase();

const filtered =
allJobs.filter(job => {

const title =
(job.title || "")
.toLowerCase();

return title.includes(text);

});

renderJobs(filtered);

}

loadJobs();

</script>

</body>
</html>
