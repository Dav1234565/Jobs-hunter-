<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobHunter AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:25px;
border-bottom:1px solid #1f2937;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
color:#94a3b8;
}

.controls{
margin-top:25px;
display:flex;
flex-direction:column;
gap:15px;
}

input,
select{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.stats{
margin-top:20px;
background:#1e293b;
padding:15px;
border-radius:10px;
}

.jobs{
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.job{
background:#1e293b;
padding:20px;
border-radius:16px;
}

.job h3{
margin-bottom:12px;
line-height:1.4;
}

.job p{
margin-bottom:10px;
color:#cbd5e1;
}

.job a{
display:inline-block;
margin-top:10px;
padding:10px 15px;
border-radius:8px;
background:#16a34a;
color:white;
text-decoration:none;
}

.favorite-btn{
margin-top:10px;
background:#f59e0b;
width:100%;
}

.favorite-btn:hover{
background:#d97706;
}

.loading{
padding:50px;
text-align:center;
font-size:18px;
}

.section-title{
margin-top:40px;
margin-bottom:20px;
}

.favorite-job{
background:#172554;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

@media(max-width:768px){

h1{
font-size:30px;
}

.jobs{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>

<div class="container">

<h1>JobHunter AI</h1>

<div class="subtitle">
‎חיפוש משרות, שמירת מועדפים וניהול חיפוש עבודה
</div>

</div>

</header>

<div class="container">

<div class="controls">

<input
type="text"
id="searchInput"
placeholder="QA Automation, Java, SDET, Backend..."
>

<select id="remoteFilter">

<option value="all">
‎כל המשרות
</option>

<option value="remote">
Remote בלבד
</option>

</select>

<button onclick="searchJobs()">
‎חפש משרות
</button>

<input
type="file"
accept=".pdf,.doc,.docx"
>

</div>

<div class="stats">

‎נמצאו
<span id="jobCount">0</span>
‎משרות

</div>

<h2 class="section-title">
‎משרות
</h2>

<div id="jobs" class="jobs"></div>

<h2 class="section-title">
‎מועדפים
</h2>

<div id="favorites"></div>

</div>

<script>

let allJobs = [];

function saveFavorite(title,company,url){

let favorites =
JSON.parse(
localStorage.getItem("favorites") || "[]"
);

const exists =
favorites.find(
job => job.url === url
);

if(exists){
return;
}

favorites.push({
title,
company,
url
});

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

renderFavorites();

}

function renderFavorites(){

const container =
document.getElementById("favorites");

const favorites =
JSON.parse(
localStorage.getItem("favorites") || "[]"
);

container.innerHTML = "";

if(favorites.length === 0){

container.innerHTML =
"<p>אין משרות שמורות</p>";

return;

}

favorites.forEach(job=>{

container.innerHTML += `
<div class="favorite-job">

<h3>${job.title}</h3>

<p>${job.company}</p>

${job.url}
‎פתח משרה
</a>

</div>
`;

});

}

async function loadJobs(){

const jobsContainer =
document.getElementById("jobs");

jobsContainer.innerHTML =
'<div class="loading">טוען משרות...</div>';

try{

const response =
await fetch(
'https://www.arbeitnow.com/api/job-board-api'
);

const data =
await response.json();

allJobs =
data.data || [];

renderJobs(allJobs);

}
catch(error){

jobsContainer.innerHTML = `
<div class="job">
<h3>שגיאה בטעינת משרות</h3>
</div>
`;

}

}

function renderJobs(jobs){

document.getElementById("jobCount")
.innerText = jobs.length;

const jobsContainer =
document.getElementById("jobs");

jobsContainer.innerHTML = "";

if(jobs.length === 0){

jobsContainer.innerHTML = `
<div class="job">
<h3>לא נמצאו משרות</h3>
</div>
`;

return;

}

jobs.slice(0,100).forEach(job=>{

jobsContainer.innerHTML += `

<div class="job">

<h3>
${job.title || ""}
</h3>

<p>
<strong>חברה:</strong>
${job.company_name || ""}
</p>

<p>
<strong>מיקום:</strong>
${job.location || "Remote"}
</p>

<p>
<strong>Remote:</strong>
${job.remote ? "כן" : "לא"}
</p>

${job.url}
‎הגש מועמדות
</a>

<button
class="favorite-btn"
onclick="saveFavorite(
'${(job.title || '').replace(/'/g,'')}',
'${(job.company_name || '').replace(/'/g,'')}',
'${job.url}'
)"
>
‎⭐ שמור למועדפים
</button>

</div>

`;

});

}

function searchJobs(){

const text =
document
.getElementById("searchInput")
.value
.toLowerCase();

const remote =
document
.getElementById("remoteFilter")
.value;

const filtered =
allJobs.filter(job => {

const title =
(job.title || "")
.toLowerCase();

const titleMatch =
title.includes(text);

const remoteMatch =
remote === "all"
? true
: job.remote === true;

return titleMatch && remoteMatch;

});

renderJobs(filtered);

}

loadJobs();
renderFavorites();

</script>

</body>
</html>
